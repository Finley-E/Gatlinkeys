name: "Early Entrepreneurship Remaster"
target_skills:
  - "problem_solving"
  - "resourcefulness"
  - "shared_creation"
vocabulary_constraints:
  - "building_action_verbs"
  - "market_coordination"
age_range:
  min: 4
  max: 8
educational_objectives:
